  <script type="text/babel" data-presets="react">

    // ══════════════════════════════════════════════════
    // ⚙️  CONFIG  — paste your Supabase values here
    // ══════════════════════════════════════════════════
    const SUPABASE_URL      = 'https://ijpdgjryrwkrirtvrcoj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqcGRnanJ5cndrcmlydHZyY29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDk5OTUsImV4cCI6MjA5Mzk4NTk5NX0.-ydS5bd_THbKKfdy8E4dzTAs7sZdKpytwIi1S0JLQ2E';

    // ══════════════════════════════════════════════════
    // 🔌  SUPABASE CLIENT
    // ══════════════════════════════════════════════════
    let db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: window.localStorage,
        detectSessionInUrl: false,
      }
    });

    // Timeout wrapper — rejects if a DB operation takes > 10 seconds
    // Ping Supabase to keep connection warm (free tier sleeps when idle)
    const pingSupabase = () => fetch(`${SUPABASE_URL}/rest/v1/`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    }).catch(() => {});

    // Ping on load, on tab focus, and every 30s to prevent idle sleep
    pingSupabase();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') pingSupabase();
    });
    setInterval(pingSupabase, 30000);

    // Recreates the Supabase client — clears zombie connections the same way
    // a page refresh would, without losing the user's form data.
    const makeClient = () => supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: window.localStorage, detectSessionInUrl: false }
    });

    // Full connection reset — exactly replicates what a page refresh does:
    // 1. New Supabase client (no zombie connections)
    // 2. getSession() — reads + refreshes auth token from localStorage
    // 3. Pings to warm the connection
    // AWAITED before the error message shows, so retry always works.
    const resetConnection = async () => {
      db = makeClient();
      try { await db.auth.getSession(); } catch(_) {}
      await pingSupabase();
    };

    // ── Error log — captures what Supabase actually returns on failure ──
    // View in browser console: copy(JSON.stringify(window._errLog, null, 2))
    window._errLog = window._errLog || [];
    const logErr = (context, error) => {
      const entry = {
        time: new Date().toISOString(),
        context,
        message:  error?.message || String(error),
        code:     error?.code,
        status:   error?.status,
        details:  error?.details,
        hint:     error?.hint,
        stack:    error?.stack?.split('\n').slice(0, 3).join(' | '),
      };
      window._errLog.push(entry);
      if (window._errLog.length > 50) window._errLog.shift(); // cap at 50 entries
      console.warn('[SplitTrip error]', entry);
    };

    // withTimeout: 3s limit. On timeout, AWAITS the full connection reset
    // before throwing the error. By the time the user reads the message
    // and taps retry, the connection is in the same state as after a refresh.
    const withTimeout = async (fn, ms = 3000) => {
      try {
        return await Promise.race([
          fn(),
          new Promise((_, reject) =>
            setTimeout(() => reject(new Error('TIMEOUT')), ms)
          ),
        ]);
      } catch(e) {
        if (e.message === 'TIMEOUT') {
          logErr('withTimeout', { message: 'Operation timed out after 3s' });
          await resetConnection();
          throw new Error('Connection reset. Tap the button to try again.');
        }
        logErr('withTimeout:unexpected', e);
        throw e;
      }
    };

    // ══════════════════════════════════════════════════
    // 💱  CURRENCIES  (supported by frankfurter.app)
    // ══════════════════════════════════════════════════
    const CURRENCIES = [
      'AED','ALL','AMD','ARS','AUD','AZN','BDT','BGN','BHD','BND',
      'BOB','BRL','CAD','CHF','CHF','CLP','CNY','COP','CZK','DKK',
      'DZD','EGP','ETB','EUR','GBP','GEL','GHS','HKD','HUF','IDR',
      'ILS','INR','IQD','ISK','JOD','JPY','KES','KHR','KRW','KWD',
      'KZT','LAK','LBP','LKR','MAD','MDL','MMK','MXN','MYR','NGN',
      'NOK','NPR','NZD','OMR','PEN','PHP','PKR','PLN','QAR','RON',
      'RSD','SAR','SEK','SGD','THB','TRY','TWD','TZS','UAH','UGX',
      'USD','UYU','VND','ZAR',
    ].filter((v, i, a) => a.indexOf(v) === i).sort();

    // ══════════════════════════════════════════════════
    // 🔄  EXCHANGE RATE  (cached, historical by date)
    // ══════════════════════════════════════════════════
    // Cache entire base-currency response to minimise API calls
    // e.g. 5 EUR expenses → only 1 fetch for eur@2025-01-10
    const _ratesCache = {};

    async function getRate(from, to, date) {
      if (from === to) return 1;
      const today = new Date().toISOString().split('T')[0];
      const apiDate = date >= today ? 'latest' : date;
      const fromL = from.toLowerCase();
      const toL   = to.toLowerCase();
      const cacheKey = `${fromL}@${apiDate}`;

      if (!_ratesCache[cacheKey]) {
        // jsDelivr-hosted currency API — no CORS issues, no API key, free
        const url = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${apiDate}/v1/currencies/${fromL}.json`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Rate API returned ${res.status}`);
        const data = await res.json();
        _ratesCache[cacheKey] = data[fromL];
      }

      const rate = _ratesCache[cacheKey]?.[toL];
      if (!rate) throw new Error(`No rate found for ${from}→${to}`);
      return rate;
    }

    // ══════════════════════════════════════════════════
    // 🧮  SETTLEMENT ALGORITHM
    // Returns: { settlements: [{from,to,amount}], balances: {memberId: number} }
    // ══════════════════════════════════════════════════
    async function computeSettlements(expenses, members, baseCurrency) {
      const balances = {};
      members.forEach(m => { balances[m.id] = 0; });

      for (const exp of expenses) {
        let rate;
        try {
          rate = await getRate(exp.currency, baseCurrency, exp.date);
        } catch(e) {
          throw new Error(`Could not fetch exchange rate for ${exp.currency}→${baseCurrency}: ${e.message}`);
        }
        if (balances[exp.paid_by_member_id] !== undefined) {
          balances[exp.paid_by_member_id] += exp.amount * rate;
        }
        for (const split of (exp.expense_splits || [])) {
          const splitBase = split.amount * rate;
          if (balances[split.member_id] !== undefined) {
            balances[split.member_id] -= splitBase;
          }
        }
      }

      // Round balances
      Object.keys(balances).forEach(k => {
        balances[k] = Math.round(balances[k] * 100) / 100;
      });

      // Minimize number of transactions (greedy)
      const pos = [], neg = [];
      Object.entries(balances).forEach(([id, bal]) => {
        if (bal > 0.005)  pos.push({ id, bal });
        if (bal < -0.005) neg.push({ id, bal });
      });
      pos.sort((a, b) => b.bal - a.bal);
      neg.sort((a, b) => a.bal - b.bal);

      const settlements = [];
      let i = 0, j = 0;
      while (i < pos.length && j < neg.length) {
        const amount = Math.min(pos[i].bal, -neg[j].bal);
        if (amount > 0.005) {
          settlements.push({
            from: neg[j].id, to: pos[i].id,
            amount: Math.round(amount * 100) / 100,
          });
        }
        pos[i].bal -= amount;
        neg[j].bal += amount;
        if (pos[i].bal < 0.005) i++;
        if (neg[j].bal > -0.005) j++;
      }

      return { settlements, balances };
    }

    // ══════════════════════════════════════════════════
    // 🗄️  DATABASE HELPERS
    // ══════════════════════════════════════════════════
    async function claimMemberships() {
      try { await db.rpc('claim_memberships'); } catch {}
    }

    async function fetchProfile(userId) {
      const { data } = await db.from('profiles').select('*').eq('id', userId).single();
      return data;
    }

    async function fetchTrips() {
      // RLS automatically filters to trips the current user is a member of
      const { data } = await db
        .from('trips')
        .select('*, trip_members(id, name, user_id)')
        .order('created_at', { ascending: false });
      return data || [];
    }

    async function fetchTripMembers(tripId) {
      const { data } = await db
        .from('trip_members')
        .select('*')
        .eq('trip_id', tripId)
        .order('created_at');
      return data || [];
    }

    async function fetchExpenses(tripId) {
      const { data: expenses, error } = await db
        .from('expenses')
        .select('*')
        .eq('trip_id', tripId)
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });
      if (error) throw error;
      if (!expenses?.length) return [];

      // Fetch splits separately to avoid RLS issues with nested selects
      const { data: splits } = await db
        .from('expense_splits')
        .select('*')
        .in('expense_id', expenses.map(e => e.id));

      return expenses.map(e => ({
        ...e,
        expense_splits: (splits || []).filter(s => s.expense_id === e.id),
      }));
    }

    async function createTrip(name, description, baseCurrency, expenseCurrency, createdBy, members) {
      const { data: trip, error } = await withTimeout(() => db
        .from('trips')
        .insert({ name, description, base_currency: baseCurrency, expense_currency: expenseCurrency, created_by: createdBy })
        .select().single());
      if (error) { logErr('createTrip', error); throw error; }

      const rows = members.map(m => ({
        trip_id: trip.id,
        name: m.name,
        email: m.email ? m.email.trim().toLowerCase() : null,
        user_id: m.userId || null,
      }));
      const { error: me } = await db.from('trip_members').insert(rows);
      if (me) throw me;
      return trip;
    }

    async function addMemberToTrip(tripId, name, email) {
      const { data, error } = await withTimeout(() => db
        .from('trip_members')
        .insert({ trip_id: tripId, name, email: email ? email.trim().toLowerCase() : null })
        .select().single());
      if (error) throw error;
      return data;
    }

    async function saveExpense(tripId, expenseData, splits, userId) {
      const { data: exp, error } = await withTimeout(() => db
        .from('expenses')
        .insert({ trip_id: tripId, ...expenseData, created_by: userId })
        .select().single());
      if (error) { logErr('saveExpense:insert', error); throw error; }

      const splitRows = splits.map(s => ({
        expense_id: exp.id,
        member_id: s.memberId,
        amount: s.amount,
      }));
      const { error: se } = await db.from('expense_splits').insert(splitRows);
      if (se) { logErr('saveExpense:splits', se); throw se; }
      return exp;
    }

    async function removeExpense(expenseId) {
      const { error: se } = await db.from('expense_splits').delete().eq('expense_id', expenseId);
      if (se) throw se;
      const { error } = await db.from('expenses').delete().eq('id', expenseId);
      if (error) throw error;
    }

    async function updateExpenseRecord(expenseId, expenseData, splits) {
      const { error } = await withTimeout(() => db.from('expenses').update(expenseData).eq('id', expenseId));
      if (error) { logErr('updateExpense', error); throw error; }
      const { error: de } = await db.from('expense_splits').delete().eq('expense_id', expenseId);
      if (de) throw de;
      const splitRows = splits.map(s => ({ expense_id: expenseId, member_id: s.memberId, amount: s.amount }));
      const { error: se } = await db.from('expense_splits').insert(splitRows);
      if (se) throw se;
    }

    async function removeMemberFromTrip(memberId) {
      const { error } = await db.from('trip_members').delete().eq('id', memberId);
      if (error) throw error;
    }

    async function updateTrip(tripId, data) {
      const { error } = await withTimeout(() => db.from('trips').update(data).eq('id', tripId));
      if (error) { logErr('updateTrip', error); throw error; }
    }

    async function deleteTripById(tripId) {
      const { error } = await db.from('trips').delete().eq('id', tripId);
      if (error) throw error;
    }

    async function updateProfileName(userId, name) {
      // Update profile table
      const { error } = await withTimeout(() => db.from('profiles').update({ name }).eq('id', userId));
      if (error) { logErr('updateProfile', error); throw error; }
      // Also update all trip_members rows for this user so everyone sees the new name
      const { error: me } = await withTimeout(() => db.from('trip_members').update({ name }).eq('user_id', userId));
      if (me) { logErr('updateMemberName', me); throw me; }
    }

    // ══════════════════════════════════════════════════
    // 🎨  FORMATTING HELPERS
    // ══════════════════════════════════════════════════
    const fmt = (amount, currency) => {
      try {
        return new Intl.NumberFormat('en-US', {
          style: 'currency', currency,
          minimumFractionDigits: 2, maximumFractionDigits: 2,
        }).format(amount);
      } catch { return `${currency} ${amount.toFixed(2)}`; }
    };

    const fmtDate = (d) =>
      new Date(d + 'T12:00:00').toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric',
      });

    const fmtDateGroup = (d) =>
      new Date(d + 'T12:00:00').toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long',
      });

    const todayISO = () => new Date().toISOString().split('T')[0];

    const PALETTE = [
      '#C8964C','#3D8B5E','#4A7FB5','#A0522D','#7B68EE',
      '#C0392B','#2980B9','#16A085','#8E44AD','#D4AC0D',
      '#E67E22','#1ABC9C',
    ];

    function memberColor(idx) { return PALETTE[idx % PALETTE.length]; }

    function Avatar({ name = '?', idx = 0, size = 'md', className = '' }) {
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      const sz = size === 'sm' ? 'w-7 h-7 text-xs' : size === 'lg' ? 'w-11 h-11 text-sm' : 'w-9 h-9 text-xs';
      return (
        <div
          className={`${sz} rounded-full flex items-center justify-center text-white font-semibold flex-shrink-0 ${className}`}
          style={{ background: memberColor(idx) }}
        >
          {initials}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // 🧩  SHARED UI COMPONENTS
    // ══════════════════════════════════════════════════
    const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

    function Spinner({ dark }) {
      return <div className={`spinner ${dark ? 'spinner-dark' : ''}`} />;
    }

    function Btn({ children, variant = 'primary', loading, disabled, full, sm, className = '', ...props }) {
      const base = `inline-flex items-center justify-center gap-2 font-semibold tracking-tight transition-all rounded-xl disabled:opacity-50 disabled:cursor-not-allowed`;
      const size = sm ? 'px-3 py-1.5 text-xs' : 'px-4 py-2.5 text-sm';
      const vars = {
        primary:   'bg-ink text-cream hover:bg-ink/85 active:scale-[0.98]',
        gold:      'bg-gold text-white hover:bg-gold-dark active:scale-[0.98] shadow-sm',
        ghost:     'bg-parchment text-ink hover:bg-ink/10 active:scale-[0.98]',
        danger:    'bg-rose-light text-rose hover:bg-rose/20 active:scale-[0.98]',
        outline:   'border border-ink/20 text-ink hover:bg-ink/5 active:scale-[0.98]',
      };
      return (
        <button
          className={`${base} ${size} ${vars[variant]} ${full ? 'w-full' : ''} ${className}`}
          disabled={loading || disabled}
          {...props}
        >
          {loading ? <Spinner /> : children}
        </button>
      );
    }

    function Field({ label, hint, children }) {
      return (
        <div>
          {label && <label className="block text-xs font-semibold text-muted uppercase tracking-widest mb-1.5">{label}</label>}
          {children}
          {hint && <p className="text-xs text-muted mt-1">{hint}</p>}
        </div>
      );
    }

    const inputCls = 'w-full px-3 py-2.5 bg-white border border-ink/12 rounded-xl text-sm text-ink placeholder-muted/50 focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold/50 transition';

    function TextInput({ label, hint, ...props }) {
      return (
        <Field label={label} hint={hint}>
          <input className={inputCls} {...props} />
        </Field>
      );
    }

    function SelectInput({ label, hint, children, ...props }) {
      return (
        <Field label={label} hint={hint}>
          <select className={inputCls + ' cursor-pointer'} {...props}>
            {children}
          </select>
        </Field>
      );
    }

    function Modal({ title, onClose, children, wide }) {
      // Prevent body scroll
      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      return (
        <div
          className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-bg"
          onClick={e => e.target === e.currentTarget && onClose()}
        >
          <div className={`bg-cream rounded-t-3xl sm:rounded-3xl w-full ${wide ? 'sm:max-w-2xl' : 'sm:max-w-md'} max-h-[92vh] overflow-y-auto slide-up`}>
            <div className="sticky top-0 bg-cream z-10 flex items-center justify-between px-5 pt-5 pb-4 border-b border-ink/8">
              <h2 className="text-base font-bold text-ink">{title}</h2>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-ink/8 transition text-muted">
                <i className="fa-solid fa-xmark text-sm" />
              </button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Toast({ message, type = 'error' }) {
      const bg = type === 'error' ? 'bg-rose-light text-rose border-rose/20' : 'bg-moss-light text-moss border-moss/20';
      return (
        <div className={`flex items-center gap-2 px-3 py-2.5 rounded-xl border text-sm ${bg}`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} flex-shrink-0`} />
          {message}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // 🏠  APP ROOT
    // ══════════════════════════════════════════════════
    function App() {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [booting, setBooting] = useState(true);
      const [selectedTrip, setSelectedTrip] = useState(null);

      const onSignIn = useCallback(async (u) => {
        setUser(u);
        await claimMemberships();
        const p = await fetchProfile(u.id);
        setProfile(p);
      }, []);

      useEffect(() => {
        const timeout = setTimeout(() => setBooting(false), 8000);

        db.auth.getSession()
          .then(async ({ data: { session } }) => {
            clearTimeout(timeout);
            if (session?.user) await onSignIn(session.user);
            setBooting(false);
          })
          .catch(() => {
            clearTimeout(timeout);
            setBooting(false);
          });

        const { data: { subscription } } = db.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_IN' && session?.user) await onSignIn(session.user);
          if (event === 'SIGNED_OUT') {
            setUser(null); setProfile(null); setSelectedTrip(null);
          }
        });
        return () => subscription.unsubscribe();
      }, [onSignIn]);

      if (booting) return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="text-center">
            <div className="w-10 h-10 rounded-2xl bg-ink flex items-center justify-center mx-auto mb-4">
              <i className="fa-solid fa-receipt text-cream" />
            </div>
            <Spinner dark />
          </div>
        </div>
      );

      if (!user) return <AuthView onAuth={onSignIn} />;
      if (selectedTrip) return (
        <TripView
          trip={selectedTrip}
          user={user}
          profile={profile}
          onBack={() => setSelectedTrip(null)}
        />
      );
      return <TripsView user={user} profile={profile} onSelectTrip={setSelectedTrip} />;
    }

    // ══════════════════════════════════════════════════
    // 🔐  AUTH VIEW
    // ══════════════════════════════════════════════════
    function AuthView({ onAuth }) {
      const [mode, setMode]     = useState('login');
      const [name, setName]     = useState('');
      const [email, setEmail]   = useState('');
      const [pass, setPass]     = useState('');
      const [err, setErr]       = useState('');
      const [ok, setOk]         = useState('');
      const [loading, setLoad]  = useState(false);

      const submit = async () => {
        setErr(''); setOk(''); setLoad(true);
        try {
          if (mode === 'register') {
            if (!name.trim()) throw new Error('Please enter your name.');
            const { error } = await db.auth.signUp({
              email, password: pass,
              options: { data: { name: name.trim() } },
            });
            if (error) throw error;
            setOk('Account created! Check your email to confirm it, then sign in.');
          } else {
            const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
            if (error) throw error;
            onAuth(data.user);
          }
        } catch (e) { setErr(e?.message || 'Something went wrong.'); }
        setLoad(false);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-cream">
          <div className="w-full max-w-sm fade-up">
            {/* Brand */}
            <div className="text-center mb-8">
              <div className="w-14 h-14 bg-ink rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i className="fa-solid fa-receipt text-gold text-xl" />
              </div>
              <h1 className="text-2xl font-bold text-ink tracking-tight">SplitTrip</h1>
              <p className="text-sm text-muted mt-1">Shared expenses, simplified.</p>
            </div>

            <div className="bg-white rounded-2xl border border-ink/8 p-6 shadow-sm">
              {/* Toggle */}
              <div className="flex gap-1 bg-parchment rounded-xl p-1 mb-5">
                {[['login','Sign In'],['register','Create Account']].map(([m, label]) => (
                  <button key={m} onClick={() => { setMode(m); setErr(''); setOk(''); }}
                    className={`flex-1 py-2 rounded-lg text-xs font-semibold tracking-tight transition-all ${mode === m ? 'bg-white shadow-sm text-ink' : 'text-muted'}`}>
                    {label}
                  </button>
                ))}
              </div>

              <div className="space-y-3">
                {mode === 'register' && (
                  <TextInput label="Your name" type="text" placeholder="Sarah Smith" value={name} onChange={e => setName(e.target.value)} />
                )}
                <TextInput label="Email" type="email" placeholder="you@email.com" value={email} onChange={e => setEmail(e.target.value)} />
                <TextInput label="Password" type="password" placeholder={mode === 'register' ? 'Min. 6 characters' : '••••••••'}
                  value={pass} onChange={e => setPass(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && submit()} />
              </div>

              {err && <div className="mt-3"><Toast message={err} /></div>}
              {ok  && <div className="mt-3"><Toast message={ok} type="success" /></div>}

              <Btn variant="gold" full loading={loading} className="mt-4" onClick={submit}>
                {mode === 'login' ? 'Sign In' : 'Create Account'}
              </Btn>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // 👤  ACCOUNT MODAL
    // ══════════════════════════════════════════════════
    function AccountModal({ user, onClose }) {
      const [section, setSection] = useState('menu'); // menu | password | delete
      const [newPass, setNewPass]     = useState('');
      const [confirmPass, setConfirm] = useState('');
      const [passErr, setPassErr]     = useState('');
      const [passOk, setPassOk]       = useState('');
      const [savingPass, setSavingPass] = useState(false);
      const [deleteConfirm, setDeleteConfirm] = useState('');
      const [deletingAcct, setDeletingAcct]   = useState(false);
      const [deleteErr, setDeleteErr] = useState('');

      const changePassword = async () => {
        setPassErr(''); setPassOk('');
        if (newPass.length < 6)          { setPassErr('Password must be at least 6 characters.'); return; }
        if (newPass !== confirmPass)      { setPassErr('Passwords do not match.'); return; }
        setSavingPass(true);
        try {
          const { error } = await db.auth.updateUser({ password: newPass });
          if (error) throw error;
          setPassOk('Password updated successfully.');
          setNewPass(''); setConfirm('');
        } catch(e) { setPassErr(e?.message || 'Could not update password.'); }
        setSavingPass(false);
      };

      const deleteAccount = async () => {
        if (deleteConfirm !== 'DELETE') { setDeleteErr('Type DELETE in capitals to confirm.'); return; }
        setDeletingAcct(true);
        // Fire the delete. Ignore any error — the moment the user is deleted
        // server-side the session becomes invalid, causing subsequent calls
        // (including error-checking) to throw. We always clear and reload.
        try { await db.rpc('delete_my_account'); } catch(_) {}
        localStorage.clear();
        window.location.reload();
      };

      return (
        <Modal title="Account" onClose={onClose}>
          {section === 'menu' && (
            <div className="space-y-2">
              <p className="text-xs text-muted mb-4">{user.email}</p>
              <button onClick={() => setSection('password')}
                className="w-full flex items-center gap-3 p-3 bg-parchment rounded-xl hover:bg-ink/8 transition text-left">
                <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center flex-shrink-0">
                  <i className="fa-solid fa-lock text-gold text-xs" />
                </div>
                <div>
                  <p className="text-sm font-semibold text-ink">Change password</p>
                  <p className="text-xs text-muted">Update your login password</p>
                </div>
                <i className="fa-solid fa-chevron-right text-muted text-xs ml-auto" />
              </button>
              <button onClick={() => setSection('errorlog')}
                className="w-full flex items-center gap-3 p-3 bg-parchment rounded-xl hover:bg-ink/8 transition text-left">
                <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center flex-shrink-0">
                  <i className="fa-solid fa-bug text-muted text-xs" />
                </div>
                <div>
                  <p className="text-sm font-semibold text-ink">Connection log</p>
                  <p className="text-xs text-muted">View recent errors for debugging</p>
                </div>
                <i className="fa-solid fa-chevron-right text-muted text-xs ml-auto" />
              </button>
              <button onClick={() => setSection('delete')}
                className="w-full flex items-center gap-3 p-3 bg-parchment rounded-xl hover:bg-rose/10 transition text-left">
                <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center flex-shrink-0">
                  <i className="fa-solid fa-user-minus text-rose text-xs" />
                </div>
                <div>
                  <p className="text-sm font-semibold text-rose">Delete account</p>
                  <p className="text-xs text-muted">Permanently remove your account</p>
                </div>
                <i className="fa-solid fa-chevron-right text-muted text-xs ml-auto" />
              </button>
            </div>
          )}

          {section === 'password' && (
            <div className="space-y-4">
              <button onClick={() => setSection('menu')} className="flex items-center gap-1.5 text-xs text-muted hover:text-ink transition mb-1">
                <i className="fa-solid fa-arrow-left" /> Back
              </button>
              <TextInput label="New password" type="password" placeholder="Min. 6 characters"
                value={newPass} onChange={e => setNewPass(e.target.value)} />
              <TextInput label="Confirm new password" type="password" placeholder="Repeat password"
                value={confirmPass} onChange={e => setConfirm(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && changePassword()} />
              {passErr && <Toast message={passErr} />}
              {passOk  && <Toast message={passOk} type="success" />}
              <Btn variant="gold" full loading={savingPass} onClick={changePassword}>
                Update Password
              </Btn>
            </div>
          )}

          {section === 'errorlog' && (
            <div className="space-y-3">
              <button onClick={() => setSection('menu')} className="flex items-center gap-1.5 text-xs text-muted hover:text-ink transition mb-1">
                <i className="fa-solid fa-arrow-left" /> Back
              </button>
              <div className="flex items-center justify-between">
                <p className="text-xs font-semibold text-muted uppercase tracking-widest">Recent errors</p>
                <button onClick={() => { window._errLog = []; }}
                  className="text-xs text-muted hover:text-ink transition">Clear</button>
              </div>
              {(!window._errLog || window._errLog.length === 0) ? (
                <div className="text-center py-8 bg-parchment rounded-xl">
                  <i className="fa-solid fa-circle-check text-moss text-xl mb-2" />
                  <p className="text-sm text-muted">No errors recorded</p>
                </div>
              ) : (
                <div className="space-y-2 max-h-80 overflow-y-auto">
                  {[...(window._errLog || [])].reverse().map((e, i) => (
                    <div key={i} className="bg-parchment rounded-xl p-3 text-xs font-mono break-all">
                      <p className="font-bold text-ink mb-1">{e.context}</p>
                      <p className="text-rose">{e.message}</p>
                      {e.code    && <p className="text-muted">code: {e.code}</p>}
                      {e.status  && <p className="text-muted">status: {e.status}</p>}
                      {e.hint    && <p className="text-muted">hint: {e.hint}</p>}
                      {e.details && <p className="text-muted">details: {e.details}</p>}
                      <p className="text-muted/60 mt-1">{e.time}</p>
                    </div>
                  ))}
                </div>
              )}
              <p className="text-xs text-muted text-center">Errors also appear in browser console</p>
            </div>
          )}

          {section === 'delete' && (
            <div className="space-y-4">
              <button onClick={() => setSection('menu')} className="flex items-center gap-1.5 text-xs text-muted hover:text-ink transition mb-1">
                <i className="fa-solid fa-arrow-left" /> Back
              </button>
              <div className="bg-rose-light border border-rose/20 rounded-xl p-4">
                <p className="text-sm font-semibold text-ink mb-1">This cannot be undone</p>
                <p className="text-xs text-muted leading-relaxed">
                  Your account will be permanently deleted. Your name will remain on any shared trips and expenses, but you'll be logged out and your email can be used to create a new account.
                </p>
              </div>
              <Field label='Type DELETE to confirm'>
                <input value={deleteConfirm} onChange={e => setDeleteConfirm(e.target.value)}
                  placeholder="DELETE"
                  className={inputCls} />
              </Field>
              {deleteErr && <Toast message={deleteErr} />}
              <Btn variant="danger" full loading={deletingAcct} onClick={deleteAccount}>
                Permanently Delete My Account
              </Btn>
            </div>
          )}
        </Modal>
      );
    }

    // ══════════════════════════════════════════════════
    // 🗺️  TRIPS LIST
    // ══════════════════════════════════════════════════
    function TripsView({ user, profile: initialProfile, onSelectTrip }) {
      const [trips, setTrips]         = useState([]);
      const [loading, setLoading]     = useState(true);
      const [loadError, setLoadError] = useState('');
      const [showCreate, setCreate]   = useState(false);
      const [profile, setProfile]     = useState(initialProfile);
      const [editingName, setEditingName] = useState(false);
      const [editName, setEditName]   = useState('');
      const [savingName, setSavingName] = useState(false);

      const [showAccount, setShowAccount] = useState(false);
      const startEditName = () => { setEditName(profile?.name || ''); setEditingName(true); };
      const cancelEditName = () => setEditingName(false);
      const saveNameChange = async () => {
        if (!editName.trim()) return;
        setSavingName(true);
        try {
          await updateProfileName(user.id, editName.trim());
          setProfile(p => ({ ...p, name: editName.trim() }));
          setEditingName(false);
        } catch(e) { alert(e?.message || 'Could not save name.'); }
        setSavingName(false);
      };

      const load = useCallback(async () => {
        setLoading(true);
        setLoadError('');
        try {
          setTrips(await fetchTrips());
        } catch (e) {
          console.error('Failed to load trips:', e);
          setLoadError(e?.message || 'Could not connect to database.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      return (
        <div className="min-h-screen bg-cream">
          {/* Header */}
          <div className="bg-ink text-cream sticky top-0 z-20">
            <div className="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
              <button onClick={load} className="flex items-center gap-2.5 hover:opacity-80 transition active:scale-95">
                <div className="w-8 h-8 bg-gold rounded-lg flex items-center justify-center">
                  <i className="fa-solid fa-receipt text-white text-sm" />
                </div>
                <span className="font-bold tracking-tight">SplitTrip</span>
              </button>
              <div className="flex items-center gap-2">
                {editingName ? (
                  <div className="flex items-center gap-1.5">
                    <input
                      autoFocus
                      value={editName}
                      onChange={e => setEditName(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') saveNameChange(); if (e.key === 'Escape') cancelEditName(); }}
                      className="w-28 px-2 py-1 bg-cream/10 border border-cream/20 rounded-lg text-xs text-cream focus:outline-none focus:border-gold/60"
                    />
                    <button onClick={saveNameChange} disabled={savingName}
                      className="text-gold hover:text-gold-light transition text-xs disabled:opacity-50">
                      {savingName ? <Spinner /> : <i className="fa-solid fa-check" />}
                    </button>
                    <button onClick={cancelEditName} className="text-cream/40 hover:text-cream transition text-xs">
                      <i className="fa-solid fa-xmark" />
                    </button>
                  </div>
                ) : (
                  <button onClick={startEditName}
                    className="flex items-center gap-1.5 text-xs text-cream/50 hover:text-cream transition group max-w-[120px]">
                    <span className="truncate">{profile?.name || user.email}</span>
                    <i className="fa-solid fa-pen text-cream/20 group-hover:text-cream/60 transition text-xs flex-shrink-0" />
                  </button>
                )}
                <button onClick={() => setShowAccount(true)}
                  className="w-9 h-9 flex items-center justify-center rounded-xl text-cream/50 hover:text-cream hover:bg-cream/10 transition" title="Account settings">
                  <i className="fa-solid fa-gear text-sm" />
                </button>
                <button onClick={() => {
                    db.auth.signOut().catch(() => {}); // fire and forget — server cleanup
                    localStorage.clear();              // clear session immediately
                    window.location.reload();
                  }}
                  className="w-9 h-9 flex items-center justify-center rounded-xl text-cream/50 hover:text-cream hover:bg-cream/10 transition" title="Sign out">
                  <i className="fa-solid fa-arrow-right-from-bracket text-sm" />
                </button>
              </div>
            </div>
          </div>
          {showAccount && (
            <AccountModal user={user} onClose={() => setShowAccount(false)} />
          )}

          <div className="max-w-lg mx-auto px-4 py-6">
            <div className="flex items-start justify-between mb-5">
              <div>
                <h2 className="text-xl font-bold text-ink">Your Trips</h2>
                <p className="text-sm text-muted">Select one or create a new trip</p>
              </div>
              <Btn variant="gold" onClick={() => setCreate(true)} sm>
                <i className="fa-solid fa-plus" /> New Trip
              </Btn>
            </div>

            {loading ? (
              <div className="flex justify-center py-16"><Spinner dark /></div>
            ) : loadError ? (
              <div className="text-center py-14 bg-white rounded-2xl border border-rose/20 fade-up">
                <i className="fa-solid fa-triangle-exclamation text-2xl text-rose mb-3" />
                <p className="font-semibold text-ink">Connection error</p>
                <p className="text-sm text-muted mt-1 mb-4 px-4">{loadError}</p>
                <Btn variant="ghost" onClick={load}>Try again</Btn>
              </div>
            ) : trips.length === 0 ? (
              <div className="text-center py-16 bg-white rounded-2xl border border-ink/8 fade-up">
                <div className="w-14 h-14 bg-parchment rounded-2xl flex items-center justify-center mx-auto mb-3">
                  <i className="fa-solid fa-plane text-gold text-xl" />
                </div>
                <p className="font-semibold text-ink">No trips yet</p>
                <p className="text-sm text-muted mt-1 mb-4">Create your first shared trip</p>
                <Btn variant="gold" onClick={() => setCreate(true)}>
                  <i className="fa-solid fa-plus" /> Create a Trip
                </Btn>
              </div>
            ) : (
              <div className="space-y-3">
                {trips.map((trip, i) => (
                  <TripCard key={trip.id} trip={trip} idx={i} onClick={() => onSelectTrip(trip)} />
                ))}
              </div>
            )}
          </div>

          {showCreate && (
            <CreateTripModal
              user={user} profile={profile}
              onCreated={trip => { setCreate(false); load(); onSelectTrip(trip); }}
              onClose={() => setCreate(false)}
            />
          )}
        </div>
      );
    }

    function TripCard({ trip, idx, onClick }) {
      const members = trip.trip_members || [];
      return (
        <button onClick={onClick}
          className="w-full bg-white rounded-2xl border border-ink/8 p-4 text-left hover:border-gold/40 hover:shadow-md transition-all active:scale-[0.99] fade-up">
          <div className="flex items-start gap-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ background: memberColor(idx), opacity: 0.85 }}>
              <i className="fa-solid fa-plane text-white text-sm" />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <h3 className="font-semibold text-ink truncate">{trip.name}</h3>
              </div>
              <div className="flex items-center gap-2 mt-2">
                <div className="flex -space-x-2">
                  {members.slice(0, 5).map((m, i) => (
                    <Avatar key={m.id} name={m.name} idx={i} size="sm" className="border-2 border-white" />
                  ))}
                  {members.length > 5 && (
                    <div className="w-7 h-7 bg-parchment border-2 border-white rounded-full flex items-center justify-center text-xs text-muted font-semibold">
                      +{members.length - 5}
                    </div>
                  )}
                </div>
                <span className="text-xs text-muted">{members.length} {members.length === 1 ? 'person' : 'people'}</span>
              </div>
            </div>
            <i className="fa-solid fa-chevron-right text-muted text-xs mt-1" />
          </div>
        </button>
      );
    }

    // ══════════════════════════════════════════════════
    // ✨  CREATE TRIP MODAL
    // ══════════════════════════════════════════════════
    function CreateTripModal({ user, profile, onCreated, onClose }) {
      const [name, setName]     = useState('');
      const [desc, setDesc]     = useState('');
      const [curr, setCurr]     = useState('AUD');
      const [expCurr, setExpCurr] = useState('AUD');
      const [members, setMems]  = useState([
        { key: 0, name: profile?.name || user.email.split('@')[0], email: user.email, userId: user.id, isYou: true },
      ]);
      const [newName, setNName] = useState('');
      const [newEmail, setNEml] = useState('');
      const [err, setErr]       = useState('');
      const [loading, setLoad]  = useState(false);
      const nextKey = useRef(1);

      const addLocal = () => {
        if (!newName.trim()) return;
        setMems(p => [...p, { key: nextKey.current++, name: newName.trim(), email: newEmail.trim() || null, userId: null, isYou: false }]);
        setNName(''); setNEml('');
      };

      const submit = async () => {
        if (!name.trim()) { setErr('Please enter a trip name.'); return; }
        // Auto-add person if they typed a name but forgot to press +
        const finalMembers = newName.trim()
          ? [...members, { key: nextKey.current++, name: newName.trim(), email: newEmail.trim() || null, userId: null, isYou: false }]
          : members;
        if (finalMembers.length < 2) { setErr('Add at least one other person.'); return; }
        setErr(''); setLoad(true);
        try {
          const trip = await createTrip(name.trim(), desc.trim(), curr, expCurr, user.id, finalMembers);
          onCreated(trip);
        } catch (e) { setLoad(false); setErr(e?.message || 'Failed to create trip.'); }
      };

      return (
        <Modal title="Create New Trip" onClose={onClose} wide>
          <div className="space-y-4">
            <TextInput label="Trip name *" placeholder="Italy 2025, Japan Trip, Vegas Weekend…" value={name} onChange={e => setName(e.target.value)} />
            <TextInput label="Description" placeholder="Optional note about the trip" value={desc} onChange={e => setDesc(e.target.value)} />
            <div className="grid grid-cols-2 gap-3">
              <SelectInput label="Default expense currency" value={expCurr} onChange={e => setExpCurr(e.target.value)}>
                {CURRENCIES.map(c => <option key={c}>{c}</option>)}
              </SelectInput>
              <SelectInput label="Default settlement currency" value={curr} onChange={e => setCurr(e.target.value)}>
                {CURRENCIES.map(c => <option key={c}>{c}</option>)}
              </SelectInput>
            </div>

            {/* Members */}
            <Field label={`People on this trip (${members.length})`}
              hint="Add email so they can log in and find this trip automatically.">
              <div className="space-y-2 mb-2">
                {members.map((m, i) => (
                  <div key={m.key} className="flex items-center gap-2 bg-parchment rounded-xl px-3 py-2.5">
                    <Avatar name={m.name} idx={i} size="sm" />
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-semibold text-ink truncate">{m.name}</p>
                      {m.email && <p className="text-xs text-muted truncate">{m.email}</p>}
                    </div>
                    {m.isYou
                      ? <span className="text-xs font-semibold text-gold">You</span>
                      : <button onClick={() => setMems(p => p.filter(x => x.key !== m.key))}
                          className="text-muted hover:text-rose transition text-xs">
                          <i className="fa-solid fa-times" />
                        </button>
                    }
                  </div>
                ))}
              </div>
              <div className="bg-parchment rounded-xl p-3">
                <p className="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Add a person</p>
                <div className="flex flex-col gap-2">
                  <input value={newName} onChange={e => setNName(e.target.value)} placeholder="Name *"
                    onKeyDown={e => e.key === 'Enter' && addLocal()}
                    className="w-full px-3 py-2 bg-white border border-ink/12 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gold/40" />
                  <div className="flex gap-2">
                    <input value={newEmail} onChange={e => setNEml(e.target.value)} placeholder="Email (optional)"
                      onKeyDown={e => e.key === 'Enter' && addLocal()}
                      className="flex-1 px-3 py-2 bg-white border border-ink/12 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gold/40" />
                    <button onClick={addLocal}

    function ExpenseCard({ expense, memberName, memberIdx, members, userId, onEdit, onDelete, onConfirmDelete, onCancelDelete, onConfirm, deleting }) {
      const isOwner = expense.created_by === userId;
      const [open, setOpen] = useState(false);
      const payer = memberName(expense.paid_by_member_id);
      const payerIdx = memberIdx(expense.paid_by_member_id);
      const addedBy = (members || []).find(m => m.user_id === expense.created_by)?.name || null;

      // Compute a short split summary for the collapsed card view
      const splitSummary = useMemo(() => {
        const splits = expense.expense_splits || [];
        if (!splits.length) return null;
        const totalMembers = (members || []).length;

        // Single person owes all
        if (splits.length === 1) {
          const name = memberName(splits[0].member_id);
          return name === payer ? 'Paid for themselves' : `${name} owes all`;
        }

        // Detect equal split (all amounts within 2 cents of each other)
        const amounts = splits.map(s => s.amount);
        const min = Math.min(...amounts), max = Math.max(...amounts);
        const isEqual = (max - min) <= 0.02;

        // Who's in the split
        const names = splits.map(s => memberName(s.member_id));
        const isAll = splits.length === totalMembers;
        const whoStr = isAll ? 'everyone' :
          names.length <= 3 ? names.join(', ') :
          `${names.slice(0, 2).join(', ')} +${names.length - 2}`;

        if (isEqual) return `Split equally · ${whoStr}`;
        return `Custom split · ${whoStr}`;
      }, [expense.expense_splits, members, payer]);

      return (
        <div className="bg-white rounded-2xl border border-ink/8 overflow-hidden transition-all">
          <button onClick={() => setOpen(!open)} className="w-full text-left p-4">
            <div className="flex items-center gap-3">
              <Avatar name={payer} idx={payerIdx} />
              <div className="flex-1 min-w-0">
                <p className="font-bold text-ink truncate">{expense.description}</p>
                <p className="text-xs text-muted mt-0.5">{payer} paid · {fmtDate(expense.date)}</p>
                {splitSummary && <p className="text-xs text-muted/85 mt-0.5">{splitSummary}</p>}
                {addedBy && <p className="text-xs text-muted/65 mt-0.5">Added by {addedBy}</p>}
              </div>
              <div className="text-right">
                <p className="font-bold text-ink">{fmt(expense.amount, expense.currency)}</p>
                <p className="text-xs text-muted">{expense.currency}</p>
              </div>
              <i className={`fa-solid fa-chevron-down text-muted text-xs transition-transform ${open ? 'rotate-180' : ''}`} />
            </div>
          </button>

          {open && (
            <div className="border-t border-parchment px-4 pb-4">
              <p className="text-xs font-semibold text-muted uppercase tracking-widest mt-3 mb-2.5">Split</p>
              <div className="space-y-2">
                {(expense.expense_splits || []).map(split => (
                  <div key={split.id} className="flex items-center gap-2.5">
                    <Avatar name={memberName(split.member_id)} idx={memberIdx(split.member_id)} size="sm" />
                    <span className="text-sm text-ink flex-1">{memberName(split.member_id)}</span>
                    <span className="text-sm font-semibold text-ink">{fmt(split.amount, expense.currency)}</span>
                  </div>
                ))}
              </div>
              <div className="mt-3 pt-3 border-t border-parchment flex items-center justify-between">
                {isOwner && (
                  <button onClick={onEdit}
                    className="flex items-center gap-1.5 text-xs text-muted hover:text-ink transition">
                    <i className="fa-solid fa-pen" /> Edit
                  </button>
                )}
                <div className="ml-auto">
                  {isOwner && (onConfirm ? (
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-muted">Sure?</span>
                      <button onClick={onDelete} disabled={deleting}
                        className="text-xs font-semibold text-rose hover:text-rose/70 transition disabled:opacity-50 flex items-center gap-1">
                        {deleting ? <Spinner /> : null} Yes, delete
                      </button>
                      <button onClick={onCancelDelete} className="text-xs text-muted hover:text-ink transition">Cancel</button>
                    </div>
                  ) : (
                    <button onClick={onConfirmDelete} disabled={deleting}
                      className="flex items-center gap-1.5 text-xs text-rose/60 hover:text-rose transition disabled:opacity-50">
                      <i className="fa-solid fa-trash-can" /> Delete
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // ➕  ADD EXPENSE MODAL
    // ══════════════════════════════════════════════════
    function AddExpenseModal({ trip, members, user, editExpense, onAdded, onClose }) {
      const isEdit = !!editExpense;

      // ── Amount formatting helpers ──
      const fmtAmt = (str) => {
        const clean = String(str).replace(/[^0-9.]/g, '');
        const [int, dec] = clean.split('.');
        const intFmt = (int || '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return dec !== undefined ? `${intFmt}.${dec}` : intFmt;
      };
      const parseAmt = (str) => parseFloat(String(str).replace(/,/g, '')) || 0;

      const [desc, setDesc]       = useState(editExpense?.description || '');
      const [amount, setAmt]      = useState(editExpense ? fmtAmt(editExpense.amount) : '');
      const [currency, setCurr]   = useState(editExpense?.currency || trip.expense_currency || trip.base_currency);
      const [date, setDate]       = useState(editExpense?.date || todayISO());
      const [paidBy, setPaid]     = useState(editExpense?.paid_by_member_id || (() => { const me = members.find(m => m.user_id === user.id); return me?.id || members[0]?.id || ''; })());
      const [splitType, setSplitRaw] = useState(() => {
        if (!isEdit || !editExpense) return 'equal';
        // Use stored split_type if available
        if (editExpense.split_type) return editExpense.split_type;
        // Fallback: detect from amounts for expenses saved before this feature
        const splits = editExpense.expense_splits || [];
        if (!splits.length) return 'equal';
        if (splits.length === 1) return 'single';
        const amounts = splits.map(s => s.amount);
        const min = Math.min(...amounts), max = Math.max(...amounts);
        if (max - min <= 0.02) return 'equal';
        if (editExpense.amount > 0) {
          const allPct = splits.every(s => {
            const pct = s.amount / editExpense.amount * 100;
            return Math.abs(pct - Math.round(pct * 100) / 100) < 0.1;
          });
          if (allPct) return 'percent';
        }
        return 'exact';
      });
      const setSplit = (type) => {
        // When switching to exact, pre-fill from current equal split selection
        if (type === 'exact' && total > 0) {
          const hasValues = Object.values(exacts).some(v => parseFloat(String(v).replace(/,/g,'')) > 0);
          if (!hasValues) {
            const inc = members.filter(m => equalSet.has(m.id));
            const denom = inc.length || members.length;
            const share = Math.floor(total / denom * 100) / 100;
            const ids = (inc.length ? inc : members).map(m => m.id);
            const newEx = {};
            let running = 0;
            ids.forEach((id, i) => {
              if (i === ids.length - 1) {
                newEx[id] = String(Math.max(0, Math.round((total - running) * 100) / 100));
              } else {
                newEx[id] = String(share);
                running += share;
              }
            });
            // Zero out members not in selection
            members.forEach(m => { if (!newEx[m.id]) newEx[m.id] = '0'; });
            setExacts(newEx);
          }
        }
        // When switching to percent, pre-fill from equalSet if all zero
        if (type === 'percent' && total > 0) {
          const hasValues = Object.values(percents).some(v => parseFloat(v) > 0 && parseFloat(v) < 100);
          if (!hasValues) {
            const inc = members.filter(m => equalSet.has(m.id));
            const denom = inc.length || members.length;
            const share = Math.round(100 / denom * 100) / 100;
            const newP = {};
            members.forEach(m => { newP[m.id] = '0'; });
            inc.forEach((m, i) => {
              newP[m.id] = i === inc.length - 1
                ? String(Math.round((100 - share * (inc.length - 1)) * 100) / 100)
                : String(share);
            });
            setPercs(newP);
          }
        }
        setSplitRaw(type);
      };
      const [equalSet, setEqSet]  = useState(() => {
        if (isEdit && editExpense?.expense_splits?.length) {
          return new Set(editExpense.expense_splits.map(s => s.member_id));
        }
        return new Set(members.map(m => m.id));
      });
      const [percents, setPercs]  = useState(() => {
        if (isEdit && editExpense?.expense_splits?.length && editExpense.amount > 0) {
          const base = Object.fromEntries(members.map(m => [m.id, '0']));
          editExpense.expense_splits.forEach(s => {
            const pct = Math.round(s.amount / editExpense.amount * 10000) / 100;
            base[s.member_id] = String(pct);
          });
          return base;
        }
        return Object.fromEntries(members.map(m => [m.id, (100 / members.length).toFixed(2)]));
      });
      const [exacts, setExacts]   = useState(() => {
        if (isEdit) {
          const base = Object.fromEntries(members.map(m => [m.id, '']));
          (editExpense.expense_splits || []).forEach(s => { base[s.member_id] = String(s.amount); });
          return base;
        }
        return Object.fromEntries(members.map(m => [m.id, '']));
      });
      const [single, setSingle]   = useState(members[1]?.id || members[0]?.id || '');
      const [err, setErr]         = useState('');
      const [loading, setLoad]    = useState(false);
      const amtRef    = useRef(null);
      const cursorRef = useRef(null);

      useLayoutEffect(() => {
        if (cursorRef.current !== null && amtRef.current) {
          amtRef.current.setSelectionRange(cursorRef.current, cursorRef.current);
          cursorRef.current = null;
        }
      });

      const total    = parseAmt(amount);

      // Preserve cursor position through comma-formatting re-renders
      const handleAmtChange = (e) => {
        const el  = e.target;
        const raw = el.value;
        const pos = el.selectionStart;
        // Count digit-characters (non-comma) before cursor in raw string
        const digitsBefore = raw.slice(0, pos).replace(/,/g, '').length;
        const formatted = fmtAmt(raw);
        // Find where that digit-count falls in the formatted string
        let digits = 0, newPos = formatted.length;
        for (let i = 0; i < formatted.length; i++) {
          if (formatted[i] !== ',') {
            if (digits === digitsBefore) { newPos = i; break; }
            digits++;
          }
        }
        // Handle cursor-at-start (digitsBefore === 0)
        if (digitsBefore === 0) newPos = 0;
        cursorRef.current = newPos;
        setAmt(formatted);
      };
      const pctTotal = Object.values(percents).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const exTotal  = Object.values(exacts).reduce((s, v) => s + (parseFloat(String(v).replace(/,/g,'')) || 0), 0);

      // Compute actual equal-split amounts including last-person rounding remainder
      const equalAmounts = useMemo(() => {
        if (total <= 0 || !equalSet.size) return {};
        const inc = members.filter(m => equalSet.has(m.id));
        const share = Math.floor(total / inc.length * 100) / 100;
        const out = {};
        let running = 0;
        inc.forEach((m, i) => {
          const isLast = i === inc.length - 1;
          const amt = isLast ? Math.round((total - running) * 100) / 100 : share;
          out[m.id] = amt;
          running += amt;
        });
        return out;
      }, [total, equalSet, members]);

      // Fix 2: auto-distribute remaining % DOWNWARD only
      // People above the changed field are never touched
      const handlePercentChange = (memberId, newVal) => {
        const idx = members.findIndex(m => m.id === memberId);
        const newPercs = { ...percents, [memberId]: newVal };

        // Sum of everyone above (fixed — don't touch them)
        const sumAbove = members.slice(0, idx).reduce(
          (s, m) => s + (parseFloat(percents[m.id]) || 0), 0
        );
        const remaining = Math.max(0, 100 - sumAbove - (parseFloat(newVal) || 0));
        const below = members.slice(idx + 1);

        if (below.length > 0) {
          const perBelow = remaining / below.length;
          below.forEach((m, i) => {
            const isLast = i === below.length - 1;
            const soFar  = below.slice(0, i).reduce(
              (s, om) => s + (parseFloat(newPercs[om.id]) || 0), 0
            );
            newPercs[m.id] = String(
              Math.round((isLast ? remaining - soFar : perBelow) * 100) / 100
            );
          });
        }
        setPercs(newPercs);
      };

      // Exact mode: change one amount, redistribute remainder downward
      const handleExactChange = (memberId, newVal) => {
        const idx    = members.findIndex(m => m.id === memberId);
        const newEx  = { ...exacts, [memberId]: newVal };
        const sumAbove = members.slice(0, idx).reduce(
          (s, m) => s + (parseFloat(String(exacts[m.id]).replace(/,/g,'')) || 0), 0
        );
        const remaining = Math.max(0, total - sumAbove - (parseFloat(String(newVal).replace(/,/g,'')) || 0));
        const below = members.slice(idx + 1);
        if (below.length > 0) {
          const perBelow = remaining / below.length;
          below.forEach((m, i) => {
            const isLast = i === below.length - 1;
            const soFar  = below.slice(0, i).reduce(
              (s, om) => s + (parseFloat(String(newEx[om.id]).replace(/,/g,'')) || 0), 0
            );
            newEx[m.id] = String(Math.round((isLast ? remaining - soFar : perBelow) * 100) / 100);
          });
        }
        setExacts(newEx);
      };

      const buildSplits = () => {
        if (splitType === 'equal') {
          const inc = members.filter(m => equalSet.has(m.id));
          if (!inc.length) return null;
          const share = Math.floor(total / inc.length * 100) / 100;
          let running = 0;
          return inc.map((m, i) => {
            const isLast = i === inc.length - 1;
            const amt = isLast ? Math.round((total - running) * 100) / 100 : share;
            running += amt;
            return { memberId: m.id, amount: amt };
          });
        }
        if (splitType === 'percent') {
          if (Math.abs(pctTotal - 100) > 0.1) return null;
          const pctRows = members.filter(m => (parseFloat(percents[m.id]) || 0) > 0);
          let running = 0;
          return pctRows.map((m, i) => {
            const isLast = i === pctRows.length - 1;
            const amt = isLast
              ? Math.round((total - running) * 100) / 100
              : Math.round(total * (parseFloat(percents[m.id]) || 0) / 100 * 100) / 100;
            running += amt;
            return { memberId: m.id, amount: amt };
          });
        }
        if (splitType === 'exact') {
          const rows = members
            .map(m => ({ memberId: m.id, amount: Math.round((parseFloat(String(exacts[m.id]).replace(/,/g,'')) || 0) * 100) / 100 }))
            .filter(s => s.amount > 0);
          if (!rows.length) return null;
          return rows;
        }
        if (splitType === 'single') {
          return [{ memberId: single, amount: total }];
        }
      };

      const submit = async () => {
        setErr('');
        if (!desc.trim()) { setErr('Please add a description.'); return; }
        const effectiveTotal = splitType === 'exact' ? exTotal : total;
        if (!effectiveTotal || effectiveTotal <= 0) { setErr('Enter a valid amount.'); return; }
        const splits = buildSplits();
        if (!splits) {
          if (splitType === 'equal')   { setErr('Select at least one person.'); return; }
          if (splitType === 'percent') { setErr(`Percentages must sum to 100% — currently ${pctTotal.toFixed(2)}%`); return; }
          if (splitType === 'exact')   { setErr('Enter amounts for at least one person.'); return; }
          if (splitType === 'exact' && Math.abs(exTotal - total) > 0.02) {
            setErr(`Split amounts (${fmt(exTotal, currency)}) must equal the total (${fmt(total, currency)})`);
            return;
          }
        }
        setLoad(true);
        try {
          const finalAmount = total;
          if (isEdit) {
            await updateExpenseRecord(editExpense.id, {
              paid_by_member_id: paidBy,
              amount: finalAmount, currency, date,
              description: desc.trim(),
              split_type: splitType,
            }, splits);
          } else {
            await saveExpense(trip.id, {
              paid_by_member_id: paidBy,
              amount: finalAmount, currency, date,
              description: desc.trim(),
              split_type: splitType,
            }, splits, user.id);
          }
          onAdded();
        } catch (e) { setLoad(false); setErr(e?.message || 'Failed to save expense.'); }
      };

      const SPLIT_TABS = [
        { key: 'equal',   label: 'Equal' },
        { key: 'percent', label: '%' },
        { key: 'exact',   label: 'Exact' },
        { key: 'single',  label: '1 Person' },
      ];

      return (
        <Modal title={isEdit ? "Edit Expense" : "Add Expense"} onClose={onClose} wide>
          <div className="space-y-4">
            <TextInput label="Description *" placeholder="Dinner, train tickets, hotel deposit…" value={desc} onChange={e => setDesc(e.target.value)} />

            <div className="flex gap-2">
              <div className="flex-1">
                <Field label="Amount *">
                  <input
                    ref={amtRef}
                    type="text" inputMode="decimal" placeholder="0.00"
                    value={amount}
                    onChange={handleAmtChange}
                    className={inputCls}
                  />
                </Field>
              </div>
              <div className="w-28">
                <SelectInput label="Currency" value={currency} onChange={e => setCurr(e.target.value)}>
                  {CURRENCIES.map(c => <option key={c}>{c}</option>)}
                </SelectInput>
              </div>
            </div>

            <div className="flex gap-2">
              <div className="flex-1">
                <TextInput label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
              </div>
              <div className="flex-1">
                <SelectInput label="Paid by" value={paidBy} onChange={e => setPaid(e.target.value)}>
                  {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </SelectInput>
              </div>
            </div>

            {/* Split type selector */}
            <div>
              <Field label="How to split">
                <div className="flex gap-1 bg-parchment rounded-xl p-1">
                  {SPLIT_TABS.map(st => (
                    <button key={st.key} onClick={() => setSplit(st.key)}
                      className={`flex-1 py-1.5 rounded-lg text-xs font-semibold tracking-tight transition-all ${splitType === st.key ? 'bg-white shadow text-ink' : 'text-muted'}`}>
                      {st.label}
                    </button>
                  ))}
                </div>
              </Field>

              <div className="mt-3 bg-parchment rounded-2xl p-3">

                {/* Equal */}
                {splitType === 'equal' && (
                  <div className="space-y-1">
                    {members.map((m, i) => (
                      <label key={m.id} className="flex items-center gap-3 p-2 rounded-xl hover:bg-white/50 cursor-pointer transition">
                        <input type="checkbox" checked={equalSet.has(m.id)}
                          onChange={e => {
                            const s = new Set(equalSet);
                            e.target.checked ? s.add(m.id) : s.delete(m.id);
                            setEqSet(s);
                          }} className="w-4 h-4" />
                        <Avatar name={m.name} idx={i} size="sm" />
                        <span className="text-sm text-ink flex-1 font-medium">{m.name}</span>
                        {total > 0 && equalSet.has(m.id) && equalAmounts[m.id] !== undefined && (
                          <span className="text-xs text-muted font-semibold flex-shrink-0">
                            {fmt(equalAmounts[m.id], currency)}
                          </span>
                        )}
                      </label>
                    ))}
                  </div>
                )}

                {/* Percentage */}
                {splitType === 'percent' && (
                  <div className="space-y-2">
                    <div className={`text-right text-xs font-bold ${Math.abs(pctTotal - 100) > 0.1 ? 'text-rose' : 'text-moss'}`}>
                      {pctTotal.toFixed(2)}% / 100%
                    </div>
                    {members.map((m, i) => (
                      <div key={m.id} className="flex items-center gap-2 py-0.5">
                        <Avatar name={m.name} idx={i} size="sm" />
                        <div className="flex-1 min-w-0">
                          <span className="text-sm text-ink font-medium block truncate">{m.name}</span>
                          {total > 0 && (
                            <span className="text-xs text-muted font-semibold">
                              {fmt(total * (parseFloat(percents[m.id]) || 0) / 100, currency)}
                            </span>
                          )}
                        </div>
                        <input type="number" value={percents[m.id]} min="0" max="100" step="0.01"
                          onChange={e => handlePercentChange(m.id, e.target.value)}
                          className="w-20 flex-shrink-0 px-2 py-1.5 bg-white border border-ink/12 rounded-lg text-sm text-right font-semibold focus:outline-none focus:ring-2 focus:ring-gold/40" />
                        <span className="text-xs text-muted flex-shrink-0">%</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Exact */}
                {splitType === 'exact' && (
                  <div className="space-y-2">
                    {total > 0 && (
                      <div className={`text-right text-xs font-bold ${Math.abs(exTotal - total) > 0.02 ? 'text-rose' : 'text-moss'}`}>
                        {fmt(exTotal, currency)} / {fmt(total, currency)}
                        {Math.abs(exTotal - total) > 0.02 && ` · ${fmt(total - exTotal, currency)} unassigned`}
                      </div>
                    )}
                    {members.map((m, i) => (
                      <div key={m.id} className="flex items-center gap-2">
                        <Avatar name={m.name} idx={i} size="sm" />
                        <span className="text-sm text-ink flex-1 font-medium">{m.name}</span>
                        <input type="number" value={exacts[m.id]} min="0" step="0.01" placeholder="0.00"
                          onChange={e => handleExactChange(m.id, e.target.value)}
                          className="w-32 px-2 py-1.5 bg-white border border-ink/12 rounded-lg text-sm text-right font-semibold focus:outline-none focus:ring-2 focus:ring-gold/40" />
                      </div>
                    ))}
                  </div>
                )}

                {/* Single person */}
                {splitType === 'single' && (
                  <div className="space-y-1">
                    <p className="text-xs text-muted mb-2">Who owes the entire amount?</p>
                    {members.map((m, i) => (
                      <label key={m.id}
                        className={`flex items-center gap-3 p-2 rounded-xl cursor-pointer transition border ${single === m.id ? 'bg-white border-gold/40' : 'border-transparent hover:bg-white/50'}`}>
                        <input type="radio" name="single" value={m.id} checked={single === m.id}
                          onChange={() => setSingle(m.id)} className="w-4 h-4" />
                        <Avatar name={m.name} idx={i} size="sm" />
                        <span className="text-sm text-ink flex-1 font-medium">{m.name}</span>
                        {single === m.id && total > 0 && (
                          <span className="text-xs font-bold text-gold">{fmt(total, currency)}</span>
                        )}
                      </label>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {err && <Toast message={err} />}

            <div className="flex gap-2 pt-1">
              <Btn variant="outline" full onClick={onClose}>Cancel</Btn>
              <Btn variant="gold" full loading={loading} onClick={submit}>Save Expense</Btn>
            </div>
          </div>
        </Modal>
      );
    }
